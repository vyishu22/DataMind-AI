services:
  - type: web
    name: datamind-api
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: datamind
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemma-4-26b-a4b-it:free
      - key: AI_PROVIDER
        value: openrouter
      - key: ALLOWED_ORIGINS
        value: "https://data-mind-i5qhndz3b-vyishu22s-projects.vercel.app,https://datamind-ai.vercel.app,http://localhost:5173"
      - key: FRONTEND_URL
        value: "https://data-mind-i5qhndz3b-vyishu22s-projects.vercel.app"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
    healthCheckPath: /api/health
    autoDeploy: true
    plan: starter
